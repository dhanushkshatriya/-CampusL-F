{% extends "base.html" %}
{% block title %}Login - Campus L&F{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="glass-card p-4 p-md-5 animate-fade-in">
                <div class="text-center mb-4">
                    <div class="auth-icon bg-primary bg-opacity-10 text-primary mx-auto"><i class="bi bi-box-arrow-in-right fs-1"></i></div>
                    <h3 class="fw-bold mt-3">Welcome Back</h3>
                    <p class="opacity-60 small">Sign in to your account</p>
                </div>
                <form method="POST" action="{{ url_for('login') }}" id="loginForm">
                    <div class="mb-3">
                        <label class="form-label fw-500"><i class="bi bi-envelope"></i> Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="you@campus.edu" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500"><i class="bi bi-lock"></i> Password</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control form-control-lg" id="loginPassword" placeholder="••••••••" required>
                            <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('loginPassword', this)"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 mt-2"><i class="bi bi-box-arrow-in-right"></i> Sign In</button>
                </form>
                <div class="text-center mt-4">
                    <p class="small opacity-75">Don't have an account? <a href="{{ url_for('register') }}" class="fw-bold">Sign Up</a></p>
                </div>
                <hr class="opacity-25">
                <div class="small opacity-50 text-center">
                    <p class="mb-1"><strong>Demo Accounts:</strong></p>
                    <p class="mb-0">Admin: admin@campus.edu / admin123</p>
                    <p class="mb-0">User: john@campus.edu / john123</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
