{% extends "base.html" %}
{% block title %}Register - Campus L&F{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="glass-card p-4 p-md-5 animate-fade-in">
                <div class="text-center mb-4">
                    <div class="auth-icon bg-success bg-opacity-10 text-success mx-auto"><i class="bi bi-person-plus fs-1"></i></div>
                    <h3 class="fw-bold mt-3">Create Account</h3>
                    <p class="opacity-60 small">Join the campus lost & found network</p>
                </div>
                <form method="POST" action="{{ url_for('register') }}" id="registerForm">
                    <div class="mb-3">
                        <label class="form-label fw-500"><i class="bi bi-person"></i> Full Name</label>
                        <input type="text" name="full_name" class="form-control form-control-lg" placeholder="Your full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500"><i class="bi bi-envelope"></i> Email</label>
                        <input type="email" name="email" class="form-control form-control-lg" placeholder="you@campus.edu" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500"><i class="bi bi-building"></i> Department</label>
                        <select name="department" class="form-select form-select-lg" required>
                            <option value="">Select Department</option>
                            {% for dept in departments %}
                            <option value="{{ dept }}">{{ dept }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-lock"></i> Password</label>
                            <div class="input-group">
                                <input type="password" name="password" class="form-control form-control-lg" id="regPassword" placeholder="Min 6 chars" required minlength="6">
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('regPassword', this)"><i class="bi bi-eye"></i></button>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-lock-fill"></i> Confirm</label>
                            <input type="password" name="confirm_password" class="form-control form-control-lg" placeholder="Repeat password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success btn-lg w-100 mt-2"><i class="bi bi-person-plus"></i> Create Account</button>
                </form>
                <div class="text-center mt-4">
                    <p class="small opacity-75">Already have an account? <a href="{{ url_for('login') }}" class="fw-bold">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
