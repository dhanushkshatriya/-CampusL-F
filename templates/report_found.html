{% extends "base.html" %}
{% block title %}{{ 'Edit' if editing else 'Report' }} Found Item - Campus L&F{% endblock %}
{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="glass-card p-4 animate-fade-in">
                <div class="d-flex align-items-center mb-4">
                    <div class="auth-icon bg-success bg-opacity-10 text-success me-3"><i class="bi bi-hand-thumbs-up fs-2"></i></div>
                    <div>
                        <h3 class="fw-bold mb-0">{{ 'Edit' if editing else 'Report' }} Found Item</h3>
                        <small class="opacity-60">Help someone find their lost item</small>
                    </div>
                </div>
                <form method="POST" enctype="multipart/form-data" id="foundForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-tag"></i> Item Name *</label>
                            <input type="text" name="item_name" class="form-control" placeholder="e.g., Blue Wallet" value="{{ item.item_name if editing else '' }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-grid"></i> Category *</label>
                            <select name="category" class="form-select" required>
                                <option value="">Select Category</option>
                                {% for cat in categories %}
                                <option value="{{ cat }}" {{ 'selected' if editing and item.category == cat else '' }}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500"><i class="bi bi-card-text"></i> Description</label>
                        <textarea name="description" class="form-control" rows="3" placeholder="Describe the found item...">{{ item.description if editing else '' }}</textarea>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-geo-alt"></i> Found Location</label>
                            <select name="found_location" class="form-select">
                                <option value="">Select Location</option>
                                {% for loc in locations %}
                                <option value="{{ loc }}" {{ 'selected' if editing and item.found_location == loc else '' }}>{{ loc }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-calendar"></i> Date Found</label>
                            <input type="date" name="date_found" class="form-control" value="{{ item.date_found if editing else '' }}">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-building"></i> Deposited At</label>
                            <input type="text" name="deposited_at" class="form-control" placeholder="e.g., Admin Office, Security Desk" value="{{ item.deposited_at if editing else '' }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-500"><i class="bi bi-image"></i> Upload Image</label>
                            <input type="file" name="image" class="form-control" accept="image/*" onchange="previewImage(this)">
                        </div>
                    </div>
                    <div id="imagePreview" class="mb-3" style="display:none;">
                        <img id="previewImg" class="rounded" style="max-height:200px;" alt="Preview">
                    </div>
                    <div class="d-flex gap-2 mt-3">
                        <button type="submit" class="btn btn-success btn-lg flex-fill"><i class="bi bi-send"></i> {{ 'Update' if editing else 'Submit Report' }}</button>
                        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
